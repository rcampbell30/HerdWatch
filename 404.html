<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>404 — HerdWatch</title>
  <style>*, *::before, *::after { box-sizing: border-box; }

    body{margin:0;padding:0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;background:#f8f7f4;color:#1a1a1a}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px}
    .card{max-width:640px;background:#fff;border-radius:14px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.07)}
    h1{margin:0 0 8px;font-size:1.6rem}
    p{margin:0 0 18px;line-height:1.6;color:#444}
    a{display:inline-block;text-decoration:none;background:#dc2626;color:#fff;padding:10px 14px;border-radius:10px;font-weight:650}
    a:hover{filter:brightness(.95)}
  
img, svg, canvas { max-width: 100%; height: auto; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Page not found</h1>
      <p>The page you requested doesn’t exist. If you followed a link, it may be outdated.</p>
      <a href="/">Go to homepage</a>
    </div>
  </div>
</body>
</html>
